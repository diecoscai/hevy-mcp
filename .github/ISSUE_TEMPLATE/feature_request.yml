name: Feature request
description: Propose a new tool, option, or behaviour.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        This server wraps the **public** Hevy API at `api.hevyapp.com/v1/*`. Features that require private endpoints (anything under `api.hevyapp.com/` without the `/v1/` prefix) are out of scope — they use a different auth scheme and can change without notice.
        See [`docs/security.md`](../../docs/security.md) for the threat model that constrains scope decisions.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to accomplish that the server does not let you do today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed tool or change
      description: |
        Tool name, input schema sketch, and expected output. If you are proposing a behaviour change to an existing tool, describe the before/after.
      render: markdown
    validations:
      required: true

  - type: input
    id: endpoint
    attributes:
      label: Underlying Hevy endpoint
      description: |
        Link to the `/v1/*` endpoint this feature uses. If no `/v1/*` endpoint exists, explain why the proposal is still in scope.
      placeholder: "https://api.hevyapp.com/docs — GET /v1/workouts/events"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you have tried, or other designs you rejected.
